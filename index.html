<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: black;
    padding: 0;
}

.container {
    max-width: 400px;
    margin: 100px auto;
    padding: 20px;
    border: 1px solid white;
    background: black;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h1 {
    text-align: center;
    color: white;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: white;
}

input[type="text"] {
    width: 95%;
    padding: 10px;
    border: 1px solid #7844ae;
    border-radius: 4px;
    background-color: black;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #5cb85c;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
p{
    color: white;
}
button:hover {
    background-color: #4cae4c;
}

.back-to-login {
    text-align: center;
    margin-top: 10px;
}

.back-to-login a {
    color: #007bff;
    text-decoration: none;
}

.back-to-login a:hover {
    text-decoration: underline;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Login Here . . . .</h1>
        <p>Please enter your Name to Login.</p>
        <form action="home.html" method="post">
            <div class="form-group">
                <label for="email">Name:</label>
                <input type="text" id="email" name="email" placeholder="Enter Name here" required>
            </div>
            <button ><a href="home.html"></a>Login Here</button>
        </form>
        <p class="back-to-login"><a href="home.html">Skip</a></p>
    </div>
</body>
</html>
